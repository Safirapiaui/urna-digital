<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Urna Digital — Assembleia</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {getDatabase,ref,set,onValue,push,remove,get} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
import {getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut,onAuthStateChanged} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
const cfg={apiKey:"AIzaSyAEHUEIHEU5VfHHvYU0aNhSsxRvYaa5ojY",authDomain:"urna-digital-6ec84.firebaseapp.com",databaseURL:"https://urna-digital-6ec84-default-rtdb.firebaseio.com",projectId:"urna-digital-6ec84",storageBucket:"urna-digital-6ec84.firebasestorage.app",messagingSenderId:"100650474766",appId:"1:100650474766:web:69531e65a1170651bd4b5f"};
const app=initializeApp(cfg);const db=getDatabase(app);const auth=getAuth(app);
window.__db=db;window.__auth=auth;window.__ref=ref;window.__set=set;window.__onValue=onValue;window.__push=push;window.__remove=remove;window.__get=get;
window.__createUser=createUserWithEmailAndPassword;window.__signIn=signInWithEmailAndPassword;window.__signOut=signOut;window.__onAuth=onAuthStateChanged;
window.__fbReady=true;window.dispatchEvent(new Event("fbReady"));
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f8;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:14px}
input:focus,select:focus,textarea:focus{outline:2px solid #1d4ed8;outline-offset:1px}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px"><div style="font-size:48px">🗳️</div><p style="color:#6b7280">Carregando...</p></div></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;
const dig=v=>v.replace(/\D/g,"").slice(0,11);
const fmtCPF=v=>{const d=dig(v);if(d.length<=3)return d;if(d.length<=6)return d.slice(0,3)+"."+d.slice(3);if(d.length<=9)return d.slice(0,3)+"."+d.slice(3,6)+"."+d.slice(6);return d.slice(0,3)+"."+d.slice(3,6)+"."+d.slice(6,9)+"-"+d.slice(9);};
const fmtT=s=>{if(s<=0)return"00:00";return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");};
const fmtDate=ts=>ts?new Date(ts).toLocaleString("pt-BR"):"—";
const pct=(n,t)=>t>0?((n/t)*100).toFixed(1):"0.0";
const dbSet=(uid,p,v)=>window.__db&&window.__set(window.__ref(window.__db,"admins/"+uid+"/"+p),v);
const dbPush=(uid,p,v)=>window.__db&&window.__push(window.__ref(window.__db,"admins/"+uid+"/"+p),v);
const dbDel=(uid,p)=>window.__db&&window.__remove(window.__ref(window.__db,"admins/"+uid+"/"+p));
const S={
  page:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"#EFF6FF"},
  card:{background:"#fff",border:"1px solid #dde3ee",borderRadius:14,padding:"1.25rem"},
  inp:{width:"100%",padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:8,background:"#fff",color:"#111",fontSize:14},
  btn:(bg,c="#fff")=>({background:bg,color:c,border:"none",borderRadius:8,padding:"10px 16px",fontWeight:600,cursor:"pointer",fontSize:14,width:"100%"}),
  btnO:{background:"transparent",border:"1px solid #d1d5db",borderRadius:8,padding:"10px 16px",fontWeight:500,cursor:"pointer",fontSize:14,color:"#374151",width:"100%"},
  lbl:{fontSize:13,color:"#6b7280",display:"block",marginBottom:4},
  badge:ok=>({display:"inline-block",padding:"2px 10px",borderRadius:99,fontSize:12,fontWeight:600,background:ok?"#dcfce7":"#fee2e2",color:ok?"#166534":"#991b1b"}),
};
function useDB(uid,path,def){
  const[v,setV]=useState(def);
  useEffect(()=>{
    if(!uid)return;
    const sub=()=>{const r=window.__ref(window.__db,"admins/"+uid+"/"+path);return window.__onValue(r,snap=>setV(snap.val()??def));};
    if(window.__fbReady)return sub();
    const h=()=>sub();window.addEventListener("fbReady",h,{once:true});return()=>window.removeEventListener("fbReady",h);
  },[uid,path]);
  return v;
}
function Crono({vot,big}){
  const[rest,setRest]=useState(0);
  useEffect(()=>{
    if(!vot||vot.status!=="aberta"){setRest(0);return;}
    const c=()=>setRest(Math.max(0,vot.duracaoSeg-Math.floor((Date.now()-vot.inicioTs)/1000)));
    c();const t=setInterval(c,500);return()=>clearInterval(t);
  },[vot?.status,vot?.inicioTs,vot?.duracaoSeg]);
  const cor=rest>60?"#16a34a":rest>30?"#d97706":"#dc2626";
  if(!vot||vot.status==="aguardando")return <span style={{color:"#d97706",fontWeight:600,fontSize:big?22:13}}>{big?"⏳ Aguardando inicio":""}</span>;
  if(vot.status==="encerrada")return <span style={{color:"#dc2626",fontWeight:600,fontSize:big?22:13}}>{big?"🔒 Encerrada":""}</span>;
  if(big)return(<div style={{textAlign:"center"}}>
    <div style={{fontSize:48,fontWeight:700,color:cor,fontVariantNumeric:"tabular-nums"}}>{fmtT(rest)}</div>
    <div style={{background:"#e5e7eb",borderRadius:99,height:8,margin:"8px 0 4px",overflow:"hidden"}}>
      <div style={{width:vot.duracaoSeg>0?(rest/vot.duracaoSeg)*100+"%":"0%",height:"100%",background:cor,transition:"width .5s",borderRadius:99}}/>
    </div>
    <span style={{fontSize:12,color:"#9ca3af"}}>tempo restante</span>
  </div>);
  return <span style={{color:cor,fontWeight:700,fontSize:14,fontVariantNumeric:"tabular-nums"}}>⏱ {fmtT(rest)}</span>;
}

function App(){
  const[fbOk,setFbOk]=useState(!!window.__fbReady);
  const[authUser,setAuthUser]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);
  const[page,setPage]=useState("inicio");
  const[moradorCtx,setMoradorCtx]=useState(null);
  const[moradorUser,setMoradorUser]=useState(null);
  const[fotoVotante,setFotoVotante]=useState(null);

  /* ✅ FIX: onAuthStateChanged agora muda page automaticamente */
  useEffect(()=>{
    const unsub=window.__onAuth(window.__auth,user=>{
      setAuthUser(user);
      setAuthLoading(false);
      if(user){
        setPage("admin");
      } else {
        setPage(p=>p==="admin"?"inicio":p);
      }
    });
    return unsub;
  },[]);

  useEffect(()=>{if(!window.__fbReady){const h=()=>setFbOk(true);window.addEventListener("fbReady",h,{once:true});return()=>window.removeEventListener("fbReady",h);}},[]);

  const uid=authUser?.uid||null;
  const condsRaw=useDB(uid,"conds",null);
  const enq=useDB(uid,"enq",{tema:"Configure a pauta no painel admin",descricao:"",duracaoMin:10});
  const listaObj=useDB(uid,"lista",null);
  const votosObj=useDB(uid,"votos",null);
  const vot=useDB(uid,"vot",{status:"aguardando",inicioTs:null,fimTs:null,duracaoSeg:600});

  useEffect(()=>{if(!uid||condsRaw!==null)return;dbSet(uid,"conds",[{id:1,nome:"Meu Condominio",ativo:true}]);},[uid,condsRaw]);

  const conds=Array.isArray(condsRaw)?condsRaw:(condsRaw?Object.values(condsRaw):[]);
  const adminLista=listaObj?Object.values(listaObj):[];
  const adminVotos=votosObj?Object.entries(votosObj).map(([k,v])=>({...v,_key:k})):[];
  const cond=conds.find(c=>c.ativo);

  useEffect(()=>{
    if(!vot||vot.status!=="aberta"||!uid)return;
    const t=setInterval(()=>{if(Math.floor((Date.now()-vot.inicioTs)/1000)>=vot.duracaoSeg)dbSet(uid,"vot",{...vot,status:"encerrada",fimTs:Date.now()});},500);
    return()=>clearInterval(t);
  },[vot?.status,uid]);

  useEffect(()=>{
    if(!moradorCtx?.vot||moradorCtx.vot.status!=="aberta")return;
    const t=setInterval(()=>{if(Math.floor((Date.now()-moradorCtx.vot.inicioTs)/1000)>=moradorCtx.vot.duracaoSeg)setMoradorCtx(c=>c?{...c,vot:{...c.vot,status:"encerrada"}}:c);},500);
    return()=>clearInterval(t);
  },[moradorCtx?.vot?.status]);

  const buscarVotacaoAtiva=async()=>{
    try{
      const snap=await window.__get(window.__ref(window.__db,"admins"));
      if(!snap.exists())return null;
      const all=snap.val();
      for(const[admUid,data] of Object.entries(all)){
        const v=data.vot;
        if(v&&v.status==="aberta"){
          const lista=data.lista?Object.values(data.lista):[];
          const votos=data.votos?Object.entries(data.votos).map(([k,x])=>({...x,_key:k})):[];
          const conds=Array.isArray(data.conds)?data.conds:(data.conds?Object.values(data.conds):[]);
          const cond=conds.find(c=>c.ativo)||conds[0]||null;
          return{uid:admUid,vot:v,lista,votos,enq:data.enq||{},cond};
        }
      }
      return null;
    }catch(e){console.error(e);return null;}
  };

  const iniciarFluxoMorador=async()=>{
    setPage("buscando");
    const ctx=await buscarVotacaoAtiva();
    if(!ctx){setPage("sem-votacao");return;}
    const votRef=window.__ref(window.__db,"admins/"+ctx.uid+"/vot");
    const votosRef=window.__ref(window.__db,"admins/"+ctx.uid+"/votos");
    const unsubVot=window.__onValue(votRef,snap=>setMoradorCtx(c=>c?{...c,vot:snap.val()||c.vot}:c));
    const unsubVotos=window.__onValue(votosRef,snap=>{const obj=snap.val();setMoradorCtx(c=>c?{...c,votos:obj?Object.entries(obj).map(([k,x])=>({...x,_key:k})):[]}:c);});
    ctx._unsubVot=unsubVot;ctx._unsubVotos=unsubVotos;
    setMoradorCtx(ctx);setPage("votar-login");
  };

  const loginMorador=(cpf,senha)=>{
    const ctx=moradorCtx;
    if(!ctx||!ctx.vot||ctx.vot.status==="aguardando")return"Votacao nao iniciada.";
    if(ctx.vot.status==="encerrada")return"Votacao ja encerrada.";
    const m=ctx.lista.find(x=>x.cpf===cpf&&x.senha===senha);
    if(!m)return"CPF ou senha invalidos. Contate a administracao.";
    if(m.inadimplente)return"Votacao bloqueada: pendencias financeiras.";
    if(ctx.votos.find(v=>v.unidade===m.unidade&&!v.procurador))return"Sua unidade ja votou.";
    setMoradorUser({...m,role:"morador"});setPage("facial");return null;
  };

  const registrar=d=>{
    dbPush(moradorCtx.uid,"votos",{...d,foto:fotoVotante||null,ts:new Date().toLocaleTimeString("pt-BR")});
    setFotoVotante(null);setMoradorUser(null);
    if(moradorCtx?._unsubVot)moradorCtx._unsubVot();
    if(moradorCtx?._unsubVotos)moradorCtx._unsubVotos();
    setMoradorCtx(null);setPage("voto-confirmado");
  };

  const logout=()=>{window.__signOut(window.__auth);};

  if(!fbOk||authLoading)return(<div style={{...S.page,flexDirection:"column",gap:12,textAlign:"center"}}><div style={{fontSize:48}}>🗳️</div><p style={{color:"#6b7280"}}>Carregando...</p></div>);

  if(authUser)return <Admin uid={uid} conds={conds} enq={enq} lista={adminLista} votos={adminVotos} vot={vot} cond={cond} onLogout={logout} onRes={()=>setPage("resultado-admin")}/>;

  if(page==="resultado-admin")return <Resultado votos={adminVotos} enq={enq} cond={cond} lista={adminLista} vot={vot} onBack={()=>setPage("admin")}/>;
  if(page==="inicio")          return <Inicio onMorador={iniciarFluxoMorador} onAdmin={()=>setPage("admin-login")} onRes={()=>setPage("resultado-publico")}/>;
  if(page==="buscando")        return <Buscando/>;
  if(page==="sem-votacao")     return <SemVotacao onVoltar={()=>setPage("inicio")}/>;
  if(page==="admin-login")     return <AdminLogin onVoltar={()=>setPage("inicio")}/>;
  if(page==="votar-login")     return <MoradorLogin ctx={moradorCtx} onLogin={loginMorador} onVoltar={()=>{if(moradorCtx?._unsubVot)moradorCtx._unsubVot();if(moradorCtx?._unsubVotos)moradorCtx._unsubVotos();setMoradorCtx(null);setPage("inicio");}} onRes={()=>setPage("resultado-publico")}/>;
  if(page==="facial")          return <Facial user={moradorUser} onOk={foto=>{setFotoVotante(foto);setPage("votando");}} onCancel={()=>{setMoradorUser(null);setPage("votar-login");}}/>;
  if(page==="votando")         return <Votar user={moradorUser} ctx={moradorCtx} onVotar={registrar} onCancel={()=>{setMoradorUser(null);setPage("votar-login");}}/>;
  if(page==="voto-confirmado") return <VotoConfirmado onRes={()=>setPage("resultado-publico")} onVoltar={()=>setPage("inicio")}/>;
  if(page==="resultado-publico")return <ResultadoPublico onVoltar={()=>setPage("inicio")}/>;
  return null;
}

function Inicio({onMorador,onAdmin,onRes}){
  return(
    <div style={S.page}><div style={{...S.card,width:"100%",maxWidth:420}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:56,marginBottom:8}}>🗳️</div>
        <h1 style={{fontWeight:700,fontSize:26,color:"#1e3a5f"}}>Urna Digital</h1>
        <p style={{fontSize:14,color:"#6b7280",marginTop:6}}>Sistema de votacao para assembleias de condominio</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <button onClick={onMorador} style={{...S.btn("#1d4ed8"),padding:"16px",fontSize:17,borderRadius:10}}>🗳️ Sou Morador — Quero Votar</button>
        <button onClick={onAdmin}   style={{...S.btn("#1e3a5f"),padding:"16px",fontSize:17,borderRadius:10}}>🔐 Sou Administradora</button>
        <button onClick={onRes}     style={{...S.btnO,fontSize:13}}>📊 Ver resultado publico</button>
      </div>
      <p style={{textAlign:"center",fontSize:11,color:"#d1d5db",marginTop:20}}>Urna Digital © 2025</p>
    </div></div>
  );
}

function Buscando(){
  return(<div style={{...S.page,flexDirection:"column",gap:16,textAlign:"center"}}>
    <div style={{fontSize:48}}>🔍</div>
    <h2 style={{color:"#1e3a5f",fontWeight:700}}>Buscando votacao ativa...</h2>
    <p style={{color:"#6b7280",fontSize:14}}>Verificando se ha uma assembleia em andamento.</p>
    <div style={{width:48,height:48,border:"4px solid #e5e7eb",borderTop:"4px solid #1d4ed8",borderRadius:"50%",animation:"spin 1s linear infinite"}}></div>
    <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
  </div>);
}

function SemVotacao({onVoltar}){
  return(<div style={S.page}><div style={{...S.card,width:"100%",maxWidth:400,textAlign:"center"}}>
    <div style={{fontSize:48,marginBottom:12}}>😕</div>
    <h2 style={{fontWeight:700,color:"#1e3a5f",marginBottom:8}}>Nenhuma votacao ativa</h2>
    <p style={{color:"#6b7280",fontSize:14,marginBottom:20}}>No momento nao ha nenhuma assembleia aberta. Entre em contato com a administracao.</p>
    <button onClick={onVoltar} style={S.btnO}>← Voltar</button>
  </div></div>);
}

function VotoConfirmado({onRes,onVoltar}){
  return(<div style={S.page}><div style={{...S.card,width:"100%",maxWidth:380,textAlign:"center"}}>
    <div style={{fontSize:64,marginBottom:12}}>✅</div>
    <h2 style={{fontWeight:700,color:"#15803d",fontSize:22,marginBottom:8}}>Voto registrado!</h2>
    <p style={{color:"#6b7280",fontSize:14,marginBottom:24}}>Seu voto foi computado com sucesso. Obrigado por participar!</p>
    <button onClick={onRes} style={{...S.btn("#1d4ed8"),marginBottom:8}}>📊 Ver resultado</button>
    <button onClick={onVoltar} style={S.btnO}>← Voltar ao inicio</button>
  </div></div>);
}

/* ✅ FIX: AdminLogin nao precisa mais setar page — o onAuthStateChanged cuida disso */
function AdminLogin({onVoltar}){
  const[modo,setModo]=useState("login");
  const[email,setEmail]=useState("");const[pw,setPw]=useState("");const[pw2,setPw2]=useState("");const[nome,setNome]=useState("");
  const[err,setErr]=useState("");const[loading,setLoading]=useState(false);

  const entrar=async()=>{
    setErr("");setLoading(true);
    try{
      await window.__signIn(window.__auth,email,pw);
      /* ✅ onAuthStateChanged cuida do redirecionamento automaticamente */
    }catch(e){
      setErr(
        e.code==="auth/invalid-credential"||e.code==="auth/wrong-password"?"Email ou senha incorretos.":
        e.code==="auth/user-not-found"?"Conta nao encontrada.":
        e.code==="auth/invalid-email"?"Email invalido.":
        "Erro: "+e.message
      );
    }
    setLoading(false);
  };

  const cadastrar=async()=>{
    if(!nome.trim()){setErr("Digite seu nome.");return;}
    if(pw!==pw2){setErr("As senhas nao coincidem.");return;}
    if(pw.length<6){setErr("Senha: minimo 6 caracteres.");return;}
    setErr("");setLoading(true);
    try{
      const cred=await window.__createUser(window.__auth,email,pw);
      const uid=cred.user.uid;
      dbSet(uid,"perfil",{nome,email,criadoEm:Date.now()});
      dbSet(uid,"conds",[{id:1,nome:"Meu Condominio",ativo:true}]);
      dbSet(uid,"vot",{status:"aguardando",inicioTs:null,fimTs:null,duracaoSeg:600});
      /* ✅ onAuthStateChanged redireciona para admin automaticamente */
    }catch(e){
      setErr(e.code==="auth/email-already-in-use"?"Email ja cadastrado.":e.message);
    }
    setLoading(false);
  };

  return(
    <div style={S.page}><div style={{...S.card,width:"100%",maxWidth:420}}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:40,marginBottom:4}}>🔐</div>
        <h2 style={{fontWeight:700,fontSize:20,color:"#1e3a5f"}}>{modo==="login"?"Acesso Administradora":"Criar Conta"}</h2>
        <p style={{fontSize:12,color:"#6b7280",marginTop:4}}>Dados completamente isolados por conta</p>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        <button onClick={()=>{setModo("login");setErr("");}} style={{flex:1,padding:"8px",borderRadius:8,border:modo==="login"?"2px solid #1e3a5f":"1px solid #d1d5db",background:modo==="login"?"#1e3a5f":"#fff",color:modo==="login"?"#fff":"#6b7280",fontWeight:600,cursor:"pointer",fontSize:13}}>Entrar</button>
        <button onClick={()=>{setModo("cadastro");setErr("");}} style={{flex:1,padding:"8px",borderRadius:8,border:modo==="cadastro"?"2px solid #1d4ed8":"1px solid #d1d5db",background:modo==="cadastro"?"#eff6ff":"#fff",color:modo==="cadastro"?"#1d4ed8":"#6b7280",fontWeight:600,cursor:"pointer",fontSize:13}}>Criar conta</button>
      </div>
      {loading&&<div style={{background:"#eff6ff",border:"1px solid #bae6fd",borderRadius:8,padding:"10px 12px",marginBottom:12,fontSize:13,color:"#1d4ed8",textAlign:"center"}}>⏳ {modo==="login"?"Entrando...":"Criando conta..."}</div>}
      {err&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"10px 12px",marginBottom:12,fontSize:13,color:"#991b1b"}}>{err}</div>}
      {modo==="cadastro"&&<div style={{marginBottom:10}}><label style={S.lbl}>Nome / Empresa</label><input style={S.inp} placeholder="Ex: Administradora Silva" value={nome} onChange={e=>setNome(e.target.value)}/></div>}
      <div style={{marginBottom:10}}><label style={S.lbl}>Email</label><input type="email" style={S.inp} placeholder="seu@email.com" value={email} onChange={e=>setEmail(e.target.value)}/></div>
      <div style={{marginBottom:modo==="cadastro"?10:16}}><label style={S.lbl}>Senha</label><input type="password" style={S.inp} placeholder={modo==="cadastro"?"Minimo 6 caracteres":"Sua senha"} value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&modo==="login"&&entrar()}/></div>
      {modo==="cadastro"&&<div style={{marginBottom:16}}><label style={S.lbl}>Confirmar senha</label><input type="password" style={S.inp} value={pw2} onChange={e=>setPw2(e.target.value)}/></div>}
      <button onClick={modo==="login"?entrar:cadastrar} disabled={loading} style={S.btn(loading?"#9ca3af":"#1e3a5f")}>{loading?"Aguarde...":(modo==="login"?"Entrar":"Criar minha conta")}</button>
      <button onClick={onVoltar} style={{...S.btnO,marginTop:8,fontSize:13}}>← Voltar</button>
      {modo==="cadastro"&&<div style={{marginTop:12,background:"#f0fdf4",borderRadius:8,padding:10,fontSize:12,color:"#15803d"}}>✅ Seus dados sao 100% privados e separados de outras administradoras.</div>}
    </div></div>
  );
}

function MoradorLogin({ctx,onLogin,onVoltar,onRes}){
  const[cpf,setCpf]=useState("");const[pw,setPw]=useState("");const[err,setErr]=useState("");
  const vot=ctx?.vot;const cond=ctx?.cond;
  const stC=!vot||vot.status==="aguardando"?"#d97706":vot.status==="encerrada"?"#dc2626":"#16a34a";
  const stL=!vot||vot.status==="aguardando"?"Aguardando":vot.status==="encerrada"?"Encerrada":"Aberta";
  const go=()=>{const e=onLogin(dig(cpf),pw);if(e)setErr(e);};
  return(
    <div style={S.page}><div style={{...S.card,width:"100%",maxWidth:400}}>
      <div style={{textAlign:"center",marginBottom:18}}>

function Facial({user,onOk,onCancel}){

  const ven=ap>rp?"APROVADO":rp>ap?"REPROVADO":"EMPATE";const hoje=new Date().toLocaleString("pt-BR");

<div style="display:flex;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:3px solid #1e3a5f"><div><div style="display:flex;align-items:center;gap:12px"><span style="font-size:32px">🗳️</span><div><h1 style="font-size:22px;color:#1e3a5f">Relatorio de Assembleia</h1><p style="color:#6b7280">${cond?.nome||""}</p></div></div><div style="margin-top:10px;font-size:13px"><p>Inicio: ${fmtDate(vot?.inicioTs)}</p><p>Encerramento: ${fmtDate(vot?.fimTs)}</p><p>Gerado: ${hoje}</p></div></div></div>
<h2>📋 Pauta</h2><div style="background:#eff6ff;border-radius:8px;padding:14px;margin-bottom:16px"><p style="font-size:16px;font-weight:700;color:#1e3a5f">${enq?.tema||""}</p>${enq?.descricao?`<p style="margin-top:4px">${enq.descricao}</p>`:""}</div>
<h2>🏆 Resultado</h2><div style="border:3px solid ${ven==="APROVADO"?"#166534":ven==="REPROVADO"?"#991b1b":"#374151"};border-radius:12px;padding:16px;text-align:center;margin-bottom:16px;background:${ven==="APROVADO"?"#dcfce7":ven==="REPROVADO"?"#fee2e2":"#f3f4f6"}"><p style="font-size:30px;font-weight:700;color:${ven==="APROVADO"?"#166534":ven==="REPROVADO"?"#991b1b":"#374151"}">${ven==="APROVADO"?"✅":ven==="REPROVADO"?"❌":"⚖️"} ${ven}</p></div>
<h2>📊 Apuracao</h2><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">${[["Total",total,"#1e3a5f"],["Aprovados",ap,"#166534"],["Reprovados",rp,"#991b1b"],["Abstencoes",ab,"#374151"]].map(([l,v,c])=>`<div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:12px;text-align:center"><div style="font-size:26px;font-weight:700;color:${c}">${v}</div><div style="font-size:11px;color:#6b7280">${l} (${pct(v,total)}%)</div></div>`).join("")}</div>
<h2>🗳️ Registro com Biometria</h2><table><thead><tr><th>Foto</th><th>Unidade</th><th>Nome</th><th>CPF</th><th>Voto</th><th>Horario</th></tr></thead><tbody>${rows}</tbody></table>

</body></html>`);w.document.close();setTimeout(()=>w.print(),1500);
  };

function ResultadoPublico({onVoltar}){
  const[loading,setLoading]=useState(true);const[ctx,setCtx]=useState(null);
  useEffect(()=>{
    const buscar=async()=>{
      const snap=await window.__get(window.__ref(window.__db,"admins"));
      if(!snap.exists()){setLoading(false);return;}
      const all=snap.val();let melhor=null;
      for(const[uid,data] of Object.entries(all)){
        const v=data.vot;
        if(v&&(v.status==="aberta"||v.status==="encerrada")){
          const votos=data.votos?Object.values(data.votos):[];
          const conds=Array.isArray(data.conds)?data.conds:(data.conds?Object.values(data.conds):[]);
          const lista=data.lista?Object.values(data.lista):[];
          melhor={vot:v,votos,enq:data.enq||{},cond:conds.find(c=>c.ativo)||conds[0],lista};
          if(v.status==="aberta")break;
        }
      }
      setCtx(melhor);setLoading(false);
    };
    buscar();
  },[]);
  if(loading)return <Buscando/>;
  if(!ctx)return <SemVotacao onVoltar={onVoltar}/>;
  const{vot,votos,enq,cond,lista}=ctx;
  const ap=votos.filter(v=>v.voto==="Aprovado").length,rp=votos.filter(v=>v.voto==="Reprovado").length,ab=votos.filter(v=>v.voto==="Abstencao").length;
  const total=votos.length,aptos=lista.filter(m=>!m.inadimplente).length,votaram=new Set(votos.map(v=>v.unidade)).size;
  const ven=ap>rp?"APROVADO":rp>ap?"REPROVADO":"EMPATE";
  const vBg=ven==="APROVADO"?"#dcfce7":ven==="REPROVADO"?"#fee2e2":"#f3f4f6";
  const vTx=ven==="APROVADO"?"#166534":ven==="REPROVADO"?"#991b1b":"#374151";
  const dur=vot?.inicioTs&&vot?.fimTs?Math.round((vot.fimTs-vot.inicioTs)/1000):null;
  return(<div style={{background:"#f0f4f8",minHeight:"100vh",padding:16}}>
    <div style={{maxWidth:560,margin:"0 auto",display:"flex",flexDirection:"column",gap:14}}>
      <div style={{...S.card,textAlign:"center"}}><div style={{fontSize:34,marginBottom:4}}>📊</div><h2 style={{fontWeight:700,fontSize:22,color:"#1e3a5f"}}>Resultado {vot.status==="aberta"?"— Tempo Real 🔴":"Final"}</h2>{cond&&<p style={{fontSize:14,color:"#6b7280",fontWeight:500}}>{cond.nome}</p>}<p style={{fontWeight:600,marginTop:4,color:"#1e3a5f"}}>{enq?.tema}</p>{dur&&<p style={{fontSize:12,color:"#9ca3af",marginTop:4}}>Duracao: {fmtT(dur)}</p>}</div>
      <div style={{background:vBg,border:"1px solid "+vTx,borderRadius:14,padding:"20px",textAlign:"center"}}><p style={{fontSize:12,fontWeight:700,color:vTx,textTransform:"uppercase",marginBottom:6}}>Resultado</p><p style={{fontSize:38,fontWeight:700,color:vTx}}>{ven==="APROVADO"?"✅":ven==="REPROVADO"?"❌":"⚖️"} {ven}</p></div>
      <div style={S.card}>{[["✅ Aprovado",ap,"#15803d"],["❌ Reprovado",rp,"#b91c1c"],["⚪ Abstencao",ab,"#4b5563"]].map(([l,v,bg])=>(<div key={l} style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:14,fontWeight:600}}>{l}</span><span style={{fontSize:14,fontWeight:700,color:bg}}>{v} · {pct(v,total)}%</span></div><div style={{background:"#e5e7eb",borderRadius:99,height:18,overflow:"hidden"}}><div style={{width:pct(v,total)+"%",height:"100%",background:bg,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:v>0?6:0,transition:"width .7s"}}>{Number(pct(v,total))>5&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>{pct(v,total)}%</span>}</div></div></div>))}</div>
      <div style={S.card}><div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>{[["Total",total],["Quorum",pct(votaram,aptos)+"%"],["Aptos",aptos],["Ausentes",aptos-votaram],["Aprovados",ap],["Reprovados",rp],["Abstencoes",ab],["Maioria",ap>rp?"Sim ✅":"Nao ❌"]].map(([l,v])=>(<div key={l} style={{background:"#f9fafb",borderRadius:8,padding:"12px",textAlign:"center",border:"1px solid #e5e7eb"}}><p style={{fontSize:20,fontWeight:700,color:"#1e3a5f",marginBottom:2}}>{v}</p><p style={{fontSize:11,color:"#6b7280"}}>{l}</p></div>))}</div></div>
      <button onClick={onVoltar} style={S.btnO}>← Voltar</button>
    </div>
  </div>);
}

      <div style={S.card}><div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>{[["Total",total],["Quorum",pct(votaram,aptos)+"%"],["Aptos",aptos],["Ausentes",aptos-votaram],["Aprovados",ap],["Reprovados",rp],["Abstencoes",ab],["Maioria",ap>rp?"Sim ✅":"Nao ❌"]].map(([l,v])=>(<div key={l} style={{background:"#f9fafb",borderRadius:8,padding:"12px",textAlign:"center",border:"1px solid #e5e7eb"}}><p style={{fontSize:20,fontWeight:700,color:"#1e3a5f",marginBottom:2}}>{v}</p><p style={{fontSize:11,color:"#6b7280"}}>{l}</p></div>))}</div></div>
      <button onClick={onBack} style={S.btnO}>← Voltar</button>
    </div>
  </div>);
}
