<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Urna Digital — Assembleia</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {getDatabase,ref,set,onValue,push,remove} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
const cfg={apiKey:"AIzaSyAEHUEIHEU5VfHHvYU0aNhSsxRvYaa5ojY",authDomain:"urna-digital-6ec84.firebaseapp.com",databaseURL:"https://urna-digital-6ec84-default-rtdb.firebaseio.com",projectId:"urna-digital-6ec84",storageBucket:"urna-digital-6ec84.firebasestorage.app",messagingSenderId:"100650474766",appId:"1:100650474766:web:69531e65a1170651bd4b5f"};
const app=initializeApp(cfg);
const db=getDatabase(app);
window.__db=db;window.__ref=ref;window.__set=set;window.__onValue=onValue;window.__push=push;window.__remove=remove;
window.__fbReady=true;window.dispatchEvent(new Event("fbReady"));
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f8;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:14px}
input:focus,select:focus,textarea:focus{outline:2px solid #1d4ed8;outline-offset:1px}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px"><div style="font-size:48px">🗳️</div><p style="color:#6b7280">Carregando sistema...</p></div></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;
const ADMIN_CPF="00000000000",ADMIN_SENHA="admin123";
const LISTA_PAD=[
  {unidade:"101",nome:"Carlos Silva",cpf:"11111111111",senha:"1234",inadimplente:false},
  {unidade:"102",nome:"Maria Souza",cpf:"22222222222",senha:"1234",inadimplente:true},
  {unidade:"201",nome:"Joao Pereira",cpf:"33333333333",senha:"1234",inadimplente:false},
  {unidade:"301",nome:"Pedro Lima",cpf:"55555555555",senha:"1234",inadimplente:false},
];
const dig=v=>v.replace(/\D/g,"").slice(0,11);
const fmtCPF=v=>{const d=dig(v);if(d.length<=3)return d;if(d.length<=6)return d.slice(0,3)+"."+d.slice(3);if(d.length<=9)return d.slice(0,3)+"."+d.slice(3,6)+"."+d.slice(6);return d.slice(0,3)+"."+d.slice(3,6)+"."+d.slice(6,9)+"-"+d.slice(9);};
const fmtT=s=>{if(s<=0)return"00:00";return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");};
const pct=(n,t)=>t>0?((n/t)*100).toFixed(1):"0.0";
const dbSet=(p,v)=>window.__db&&window.__set(window.__ref(window.__db,p),v);
const dbPush=(p,v)=>window.__db&&window.__push(window.__ref(window.__db,p),v);
const dbDel=(p)=>window.__db&&window.__remove(window.__ref(window.__db,p));

const S={
  page:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"#EFF6FF"},
  card:{background:"#fff",border:"1px solid #dde3ee",borderRadius:14,padding:"1.25rem"},
  inp:{width:"100%",padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:8,background:"#fff",color:"#111",fontSize:14},
  btn:(bg,c="#fff")=>({background:bg,color:c,border:"none",borderRadius:8,padding:"10px 16px",fontWeight:600,cursor:"pointer",fontSize:14,width:"100%"}),
  btnO:{background:"transparent",border:"1px solid #d1d5db",borderRadius:8,padding:"10px 16px",fontWeight:500,cursor:"pointer",fontSize:14,color:"#374151",width:"100%"},
  lbl:{fontSize:13,color:"#6b7280",display:"block",marginBottom:4},
  badge:ok=>({display:"inline-block",padding:"2px 10px",borderRadius:99,fontSize:12,fontWeight:600,background:ok?"#dcfce7":"#fee2e2",color:ok?"#166534":"#991b1b"}),
};

function useDB(path,def){
  const[v,setV]=useState(def);
  useEffect(()=>{
    const sub=()=>{const r=window.__ref(window.__db,path);return window.__onValue(r,snap=>setV(snap.val()??def));};
    if(window.__fbReady)return sub();
    const h=()=>sub();window.addEventListener("fbReady",h,{once:true});return()=>window.removeEventListener("fbReady",h);
  },[path]);
  return v;
}

function Crono({vot,big}){
  const[rest,setRest]=useState(0);
  useEffect(()=>{
    if(!vot||vot.status!=="aberta"){setRest(0);return;}
    const c=()=>setRest(Math.max(0,vot.duracaoSeg-Math.floor((Date.now()-vot.inicioTs)/1000)));
    c();const t=setInterval(c,500);return()=>clearInterval(t);
  },[vot?.status,vot?.inicioTs,vot?.duracaoSeg]);
  const cor=rest>60?"#16a34a":rest>30?"#d97706":"#dc2626";
  if(!vot||vot.status==="aguardando")return <span style={{color:"#d97706",fontWeight:600,fontSize:big?22:13}}>{big?"⏳ Aguardando inicio":""}</span>;
  if(vot.status==="encerrada")return <span style={{color:"#dc2626",fontWeight:600,fontSize:big?22:13}}>{big?"🔒 Encerrada":""}</span>;
  if(big)return(<div style={{textAlign:"center"}}>
    <div style={{fontSize:48,fontWeight:700,color:cor,fontVariantNumeric:"tabular-nums"}}>{fmtT(rest)}</div>
    <div style={{background:"#e5e7eb",borderRadius:99,height:8,margin:"8px 0 4px",overflow:"hidden"}}>
      <div style={{width:vot.duracaoSeg>0?(rest/vot.duracaoSeg)*100+"%":"0%",height:"100%",background:cor,transition:"width .5s",borderRadius:99}}/>
    </div>
    <span style={{fontSize:12,color:"#9ca3af"}}>tempo restante</span>
  </div>);
  return <span style={{color:cor,fontWeight:700,fontSize:14,fontVariantNumeric:"tabular-nums"}}>⏱ {fmtT(rest)}</span>;
}

/* ══ APP ══ */
function App(){
  const[user,setUser]=useState(null);
  const[page,setPage]=useState("login");
  const[fbOk,setFbOk]=useState(!!window.__fbReady);
  const[fotoVotante,setFotoVotante]=useState(null);

  const condsRaw=useDB("conds",null);
  const enq=useDB("enq",{tema:"Configure a pauta no painel admin",descricao:"",condominioId:1,duracaoMin:10});
  const listaObj=useDB("lista",null);
  const votosObj=useDB("votos",null);
  const vot=useDB("vot",{status:"aguardando",inicioTs:null,fimTs:null,duracaoSeg:600});

  useEffect(()=>{if(!window.__fbReady){const h=()=>setFbOk(true);window.addEventListener("fbReady",h,{once:true});return()=>window.removeEventListener("fbReady",h);}}, []);
  useEffect(()=>{if(!fbOk||condsRaw!==null)return;dbSet("conds",[{id:1,nome:"Condominio Exemplo",ativo:true}]);},[fbOk,condsRaw]);
  useEffect(()=>{if(!fbOk||listaObj!==null)return;const o={};LISTA_PAD.forEach((m,i)=>o[i]=m);dbSet("lista",o);},[fbOk,listaObj]);

  const conds=Array.isArray(condsRaw)?condsRaw:(condsRaw?Object.values(condsRaw):[]);
  const lista=listaObj?Object.values(listaObj):LISTA_PAD;
  const votos=votosObj?Object.entries(votosObj).map(([k,v])=>({...v,_key:k})):[];
  const cond=conds.find(c=>c.ativo);

  useEffect(()=>{
    if(!vot||vot.status!=="aberta")return;
    const t=setInterval(()=>{if(Math.floor((Date.now()-vot.inicioTs)/1000)>=vot.duracaoSeg)dbSet("vot",{...vot,status:"encerrada",fimTs:Date.now()});},500);
    return()=>clearInterval(t);
  },[vot?.status]);

  const login=(cpf,senha)=>{
    if(cpf===ADMIN_CPF&&senha===ADMIN_SENHA){setUser({cpf,nome:"Administradora",role:"admin"});setPage("admin");return null;}
    if(!vot||vot.status==="aguardando")return"Votacao nao iniciada pelo administrador.";
    if(vot.status==="encerrada")return"Votacao ja encerrada.";
    const m=lista.find(x=>x.cpf===cpf&&x.senha===senha);
    if(!m)return"CPF ou senha invalidos. Contate a administracao.";
    if(m.inadimplente)return"Votacao bloqueada: pendencias financeiras na unidade.";
    if(votos.find(v=>v.unidade===m.unidade&&!v.procurador))return"Sua unidade ja votou nesta sessao.";
    setUser({...m,role:"morador"});setPage("facial");return null;
  };

  const onFotoCapturada=(foto)=>{setFotoVotante(foto);setPage("votar");};

  const registrar=d=>{
    dbPush("votos",{...d,foto:fotoVotante||null,ts:new Date().toLocaleTimeString("pt-BR")});
    setFotoVotante(null);setUser(null);setPage("login");
  };

  if(!fbOk)return(<div style={{...S.page,flexDirection:"column",gap:12,textAlign:"center"}}><div style={{fontSize:48}}>🗳️</div><p style={{color:"#6b7280",fontSize:16}}>Conectando...</p></div>);

  if(page==="login")    return <Login    cond={cond} vot={vot} onLogin={login} onRes={()=>setPage("resultado")}/>;
  if(page==="admin")    return <Admin    conds={conds} enq={enq} lista={lista} votos={votos} vot={vot} cond={cond} onLogout={()=>{setUser(null);setPage("login");}} onRes={()=>setPage("resultado")}/>;
  if(page==="facial")   return <Facial   user={user} onOk={onFotoCapturada} onCancel={()=>{setUser(null);setPage("login");}}/>;
  if(page==="votar")    return <Votar    user={user} enq={enq} cond={cond} lista={lista} votos={votos} vot={vot} onVotar={registrar} onCancel={()=>{setUser(null);setPage("login");}}/>;
  if(page==="resultado")return <Resultado votos={votos} enq={enq} cond={cond} lista={lista} vot={vot} onBack={()=>setPage(user?.role==="admin"?"admin":"login")}/>;
  return null;
}

/* ══ LOGIN ══ */
function Login({cond,vot,onLogin,onRes}){
  const[cpf,setCpf]=useState("");const[pw,setPw]=useState("");const[err,setErr]=useState("");const[role,setRole]=useState("morador");
  const go=()=>{const e=onLogin(dig(cpf),pw);if(e)setErr(e);};
  const stC=!vot||vot.status==="aguardando"?"#d97706":vot.status==="encerrada"?"#dc2626":"#16a34a";
  const stL=!vot||vot.status==="aguardando"?"Aguardando":vot.status==="encerrada"?"Encerrada":"Aberta";
  return(
    <div style={S.page}><div style={{...S.card,width:"100%",maxWidth:400}}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:44,marginBottom:4}}>🗳️</div>
        <h1 style={{fontWeight:700,fontSize:22,color:"#1e3a5f"}}>Urna Digital</h1>
        {cond&&<p style={{fontSize:14,color:"#6b7280",marginTop:4,fontWeight:500}}>{cond.nome}</p>}
        <div style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:8,background:"#f9fafb",padding:"4px 12px",borderRadius:99,border:"1px solid #e5e7eb"}}>
          <span style={{width:8,height:8,borderRadius:"50%",background:stC,display:"inline-block"}}></span>
          <span style={{fontSize:13,fontWeight:600,color:stC}}>Votacao: {stL}</span>
        </div>
      </div>
      {vot?.status==="aberta"&&<div style={{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:10,padding:14,marginBottom:14}}><Crono vot={vot} big/></div>}
      {vot?.status==="encerrada"&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:12,marginBottom:14,textAlign:"center"}}>
        <p style={{color:"#991b1b",fontWeight:600,fontSize:14}}>🔒 Votacao encerrada</p>
        <button onClick={onRes} style={{background:"none",border:"none",color:"#1d4ed8",cursor:"pointer",fontSize:13,marginTop:4}}>Ver resultado →</button>
      </div>}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <button onClick={()=>setRole("morador")} style={{flex:1,padding:"8px",borderRadius:8,border:role==="morador"?"2px solid #1d4ed8":"1px solid #d1d5db",background:role==="morador"?"#eff6ff":"#fff",color:role==="morador"?"#1d4ed8":"#6b7280",fontWeight:600,cursor:"pointer",fontSize:13}}>👤 Morador</button>
        <button onClick={()=>setRole("admin")} style={{flex:1,padding:"8px",borderRadius:8,border:role==="admin"?"2px solid #1e3a5f":"1px solid #d1d5db",background:role==="admin"?"#1e3a5f":"#fff",color:role==="admin"?"#fff":"#6b7280",fontWeight:600,cursor:"pointer",fontSize:13}}>🔐 Administrador</button>
      </div>
      {err&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"10px 12px",marginBottom:12,fontSize:13,color:"#991b1b"}}>{err}</div>}
      <div style={{marginBottom:10}}><label style={S.lbl}>CPF</label><input style={S.inp} placeholder="000.000.000-00" value={fmtCPF(cpf)} onChange={e=>setCpf(e.target.value)}/></div>
      <div style={{marginBottom:16}}><label style={S.lbl}>Senha</label><input type="password" style={S.inp} placeholder={role==="morador"?"Senha enviada pela administracao":"Senha do administrador"} value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/></div>
      <button onClick={go} style={S.btn(role==="admin"?"#1e3a5f":"#1d4ed8")}>{role==="admin"?"🔐 Entrar como Administrador":"🗳️ Entrar para Votar"}</button>
      <button onClick={onRes} style={{...S.btnO,marginTop:8,fontSize:13}}>📊 Ver resultado publico</button>
      {role==="morador"&&<div style={{marginTop:14,background:"#f0f9ff",borderRadius:8,padding:10,fontSize:12,color:"#0369a1"}}><strong>Como votar?</strong><br/>Digite seu CPF e a senha enviada pela administracao.</div>}
    </div></div>
  );
}

/* ══ FACIAL — com foto salva ══ */
function Facial({user,onOk,onCancel}){
  const vRef=useRef();const cRef=useRef();const stRef=useRef(null);
  const[foto,setFoto]=useState(null);const[semCam,setSemCam]=useState(false);
  useEffect(()=>{
    navigator.mediaDevices?.getUserMedia({video:true}).then(s=>{stRef.current=s;if(vRef.current){vRef.current.srcObject=s;vRef.current.play();}}).catch(()=>setSemCam(true));
    return()=>stRef.current?.getTracks().forEach(t=>t.stop());
  },[]);
  const cap=()=>{const v=vRef.current,c=cRef.current;if(!v||!c)return;c.width=v.videoWidth||320;c.height=v.videoHeight||240;c.getContext("2d").drawImage(v,0,0);setFoto(c.toDataURL("image/jpeg",.6));stRef.current?.getTracks().forEach(t=>t.stop());};
  return(
    <div style={S.page}><div style={{...S.card,width:"100%",maxWidth:420}}>
      <h2 style={{fontWeight:700,textAlign:"center",fontSize:20,color:"#1e3a5f",marginBottom:4}}>Identificacao Facial</h2>
      <p style={{textAlign:"center",color:"#6b7280",fontSize:13,marginBottom:4}}>Ola, <strong>{user.nome}</strong> — Unidade {user.unidade}</p>
      <p style={{textAlign:"center",color:"#9ca3af",fontSize:12,marginBottom:14}}>Sua foto sera registrada junto ao voto para fins de auditoria</p>
      {semCam&&<div style={{...S.badge(false),display:"block",textAlign:"center",padding:"8px",marginBottom:12}}>Camera nao disponivel neste dispositivo</div>}
      <div style={{background:"#f3f4f6",borderRadius:10,overflow:"hidden",marginBottom:14,aspectRatio:"4/3",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
        {!foto?<video ref={vRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<img src={foto} alt="foto" style={{width:"100%",height:"100%",objectFit:"cover"}}/>}
        {!foto&&!semCam&&<div style={{position:"absolute",inset:18,border:"2px dashed #3b82f6",borderRadius:10,pointerEvents:"none"}}/>}
        {foto&&<div style={{position:"absolute",top:8,right:8,background:"#15803d",color:"#fff",borderRadius:99,padding:"2px 8px",fontSize:12,fontWeight:600}}>✅ Foto capturada</div>}
      </div>
      <canvas ref={cRef} style={{display:"none"}}/>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {!foto?<>
          {!semCam&&<button onClick={cap} style={S.btn("#1d4ed8")}>📸 Capturar foto</button>}
          {semCam&&<button onClick={()=>onOk(null)} style={S.btn("#1d4ed8")}>Continuar sem camera</button>}
        </>:<>
          <button onClick={()=>onOk(foto)} style={S.btn("#15803d")}>✅ Confirmar e votar</button>
          <button onClick={()=>setFoto(null)} style={S.btnO}>🔄 Tirar novamente</button>
        </>}
        <button onClick={onCancel} style={{...S.btnO,color:"#dc2626",borderColor:"#fca5a5"}}>Cancelar</button>
      </div>
    </div></div>
  );
}

/* ══ VOTAR ══ */
function Votar({user,enq,cond,lista,votos,vot,onVotar,onCancel}){
  const[proc,setProc]=useState(false);const[urep,setUrep]=useState("");const[conf,setConf]=useState(null);const[err,setErr]=useState("");
  useEffect(()=>{if(vot&&vot.status==="encerrada")onCancel();},[vot?.status]);
  const disp=lista.filter(m=>m.unidade!==user.unidade&&!votos.find(v=>v.unidade===m.unidade)&&!m.inadimplente);
  const votar=v=>{if(proc&&!urep){setErr("Selecione a unidade.");return;}setErr("");setConf(v);};
  const ico={Aprovado:"✅",Reprovado:"❌",Abstencao:"⚪"};
  const clr={Aprovado:"#15803d",Reprovado:"#b91c1c",Abstencao:"#4b5563"};
  if(conf)return(
    <div style={S.page}><div style={{...S.card,width:"100%",maxWidth:340,textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:8}}>{ico[conf]}</div>
      <h2 style={{fontWeight:700,marginBottom:6,color:"#1e3a5f"}}>Confirmar voto?</h2>
      <p style={{fontSize:13,color:"#6b7280",marginBottom:10}}>{enq?.tema}</p>
      <p style={{fontSize:28,fontWeight:700,color:clr[conf],marginBottom:14}}>{conf}</p>
      {proc&&<p style={{fontSize:13,color:"#1d4ed8",marginBottom:14}}>Procurador da unidade {urep}</p>}
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setConf(null)} style={{...S.btnO,flex:1}}>Voltar</button>
        <button onClick={()=>onVotar({unidade:user.unidade,nome:user.nome,cpf:user.cpf,voto:conf,procurador:proc,unidadeRep:proc?urep:""})} style={{...S.btn("#1d4ed8"),flex:1}}>Confirmar</button>
      </div>
    </div></div>
  );
  return(
    <div style={S.page}><div style={{...S.card,width:"100%",maxWidth:440}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div><h2 style={{fontWeight:700,fontSize:18,color:"#1e3a5f"}}>Assembleia</h2><p style={{fontSize:13,color:"#6b7280"}}>{cond?.nome}</p></div>
        <div style={{textAlign:"right"}}><p style={{fontWeight:600,fontSize:14}}>{user.nome}</p><p style={{fontSize:13,color:"#6b7280"}}>Unid. {user.unidade}</p></div>
      </div>
      <div style={{background:"#f0f9ff",borderRadius:8,padding:"8px 12px",marginBottom:12,textAlign:"center"}}><Crono vot={vot}/></div>
      <div style={{background:"#eff6ff",borderRadius:8,padding:"12px 14px",marginBottom:14}}>
        <p style={{fontSize:11,fontWeight:700,color:"#1d4ed8",textTransform:"uppercase",marginBottom:2}}>Pauta</p>
        <p style={{fontWeight:600,color:"#1e3a5f"}}>{enq?.tema}</p>
        {enq?.descricao&&<p style={{fontSize:13,color:"#6b7280",marginTop:4}}>{enq.descricao}</p>}
      </div>
      <div style={{marginBottom:14}}>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:14,marginBottom:proc?8:0}}>
          <input type="checkbox" checked={proc} onChange={e=>setProc(e.target.checked)}/> Sou procurador de outra unidade
        </label>
        {proc&&<select style={S.inp} value={urep} onChange={e=>setUrep(e.target.value)}>
          <option value="">Selecione a unidade...</option>
          {disp.map(m=><option key={m.unidade} value={m.unidade}>Unidade {m.unidade} — {m.nome}</option>)}
        </select>}
        {err&&<p style={{color:"#dc2626",fontSize:13,marginTop:4}}>{err}</p>}
      </div>
      <p style={{textAlign:"center",fontSize:13,color:"#6b7280",marginBottom:10}}>Selecione seu voto:</p>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {["Aprovado","Reprovado","Abstencao"].map(v=>(
          <button key={v} onClick={()=>votar(v)} style={{flex:1,padding:"16px 4px",border:"none",borderRadius:8,background:clr[v],color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13,lineHeight:1.4}}>
            {ico[v]}<br/>{v}
          </button>
        ))}
      </div>
      <button onClick={onCancel} style={{...S.btnO,fontSize:13}}>Cancelar</button>
    </div></div>
  );
}

/* ══ ADMIN ══ */
function Admin({conds,enq,lista,votos,vot,cond,onLogout,onRes}){
  const[tab,setTab]=useState("dash");
  const tabs=[["dash","📊 Dashboard"],["enq","📋 Enquete"],["lista","👥 Lista"],["conds","🏢 Condominios"],["votos","🗳️ Votos"]];
  return(
    <div style={{minHeight:"100vh",background:"#f0f4f8"}}>
      <header style={{background:"#1e3a5f",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>🗳️</span>
          <div><p style={{fontWeight:700,fontSize:15,color:"#fff",lineHeight:1}}>Urna Digital</p><p style={{fontSize:11,color:"#93c5fd"}}>Painel Administrativo</p></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Crono vot={vot}/>
          <button onClick={onRes} style={{...S.btn("#1d4ed8"),width:"auto",padding:"6px 12px",fontSize:12}}>Resultado</button>
          <button onClick={onLogout} style={{...S.btn("#b91c1c"),width:"auto",padding:"6px 12px",fontSize:12}}>Sair</button>
        </div>
      </header>
      <nav style={{background:"#fff",borderBottom:"1px solid #e5e7eb",display:"flex",overflowX:"auto"}}>
        {tabs.map(([k,l])=>(<button key={k} onClick={()=>setTab(k)} style={{padding:"11px 14px",border:"none",borderBottom:tab===k?"2px solid #1d4ed8":"2px solid transparent",background:"transparent",cursor:"pointer",whiteSpace:"nowrap",fontSize:13,fontWeight:tab===k?700:400,color:tab===k?"#1d4ed8":"#6b7280"}}>{l}</button>))}
      </nav>
      <div style={{padding:16,maxWidth:860,margin:"0 auto"}}>
        {tab==="dash"  &&<Dash  cond={cond} lista={lista} votos={votos} enq={enq} vot={vot} onRes={onRes}/>}
        {tab==="enq"   &&<TabEnq enq={enq} conds={conds} vot={vot}/>}
        {tab==="lista" &&<TabLista lista={lista}/>}
        {tab==="conds" &&<TabConds conds={conds}/>}
        {tab==="votos" &&<TabVotos votos={votos}/>}
      </div>
    </div>
  );
}

function Dash({cond,lista,votos,enq,vot,onRes}){
  const aptos=lista.filter(m=>!m.inadimplente).length;
  const votaram=new Set(votos.map(v=>v.unidade)).size;
  const ap=votos.filter(v=>v.voto==="Aprovado").length,rp=votos.filter(v=>v.voto==="Reprovado").length,ab=votos.filter(v=>v.voto==="Abstencao").length;
  const iniciar=()=>dbSet("vot",{status:"aberta",inicioTs:Date.now(),fimTs:null,duracaoSeg:(enq?.duracaoMin||10)*60});
  const encerrar=()=>dbSet("vot",{...vot,status:"encerrada",fimTs:Date.now()});
  const reiniciar=()=>{dbSet("vot",{status:"aguardando",inicioTs:null,fimTs:null,duracaoSeg:600});dbSet("votos",null);};
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={S.card}>
        <p style={{fontWeight:700,fontSize:16,color:"#1e3a5f",marginBottom:2}}>{cond?.nome||"Configure o condominio"}</p>
        <p style={{fontSize:13,color:"#6b7280",marginBottom:2}}>{enq?.tema||"Configure a pauta na aba Enquete"}</p>
        <p style={{fontSize:12,color:"#9ca3af",marginBottom:14}}>Duracao: {enq?.duracaoMin||10} min</p>
        <Crono vot={vot} big/>
        <div style={{display:"flex",gap:8,marginTop:16,flexWrap:"wrap"}}>
          {(!vot||vot.status==="aguardando")&&<button onClick={iniciar} style={S.btn("#15803d")}>▶ Iniciar Votacao</button>}
          {vot?.status==="aberta"&&<button onClick={encerrar} style={S.btn("#b91c1c")}>🔒 Encerrar agora</button>}
          {vot?.status==="encerrada"&&<><button onClick={onRes} style={{...S.btn("#1d4ed8"),flex:1}}>📊 Resultado</button><button onClick={reiniciar} style={{...S.btnO,flex:1}}>🔄 Nova votacao</button></>}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {[["Aptos",aptos],["Votaram",votaram],["Aprovados",ap],["Reprovados",rp],["Abstencoes",ab],["Quorum",pct(votaram,aptos)+"%"]].map(([l,v])=>(
          <div key={l} style={{background:"#f9fafb",borderRadius:8,padding:"12px 10px",textAlign:"center",border:"1px solid #e5e7eb"}}>
            <p style={{fontSize:22,fontWeight:700,color:"#1e3a5f",marginBottom:2}}>{v}</p><p style={{fontSize:11,color:"#6b7280"}}>{l}</p>
          </div>
        ))}
      </div>
      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><p style={{...S.lbl,marginBottom:0}}>Progresso 🔴</p><p style={{fontSize:12,color:"#9ca3af"}}>{votaram}/{aptos}</p></div>
        <div style={{background:"#e5e7eb",borderRadius:99,height:10,overflow:"hidden"}}>
          <div style={{width:pct(votaram,aptos)+"%",height:"100%",background:"#1d4ed8",borderRadius:99,transition:"width .5s"}}/>
        </div>
      </div>
    </div>
  );
}

function TabEnq({enq,conds,vot}){
  const[f,setF]=useState(enq||{});
  useEffect(()=>{if(enq)setF(enq);},[JSON.stringify(enq)]);
  const lock=vot?.status==="aberta";
  return(
    <div style={S.card}>
      <h3 style={{fontWeight:700,marginBottom:14,color:"#1e3a5f"}}>⚙️ Configurar Enquete</h3>

      <div style={{marginBottom:12}}><label style={S.lbl}>Condominio ativo</label>
        <select disabled={lock} style={S.inp} value={f.condominioId||""} onChange={e=>setF(p=>({...p,condominioId:+e.target.value}))}>
          {conds.map((c,i)=><option key={c.id||i} value={c.id||i}>{c.nome}</option>)}
        </select>
      </div>
      <div style={{marginBottom:12}}><label style={S.lbl}>Tema / Pauta</label><input disabled={lock} style={S.inp} value={f.tema||""} onChange={e=>setF(p=>({...p,tema:e.target.value}))} placeholder="Ex: Aprovacao do fundo de reserva 2025"/></div>
      <div style={{marginBottom:12}}><label style={S.lbl}>Descricao</label><textarea disabled={lock} rows={3} style={{...S.inp,resize:"vertical"}} value={f.descricao||""} onChange={e=>setF(p=>({...p,descricao:e.target.value}))} placeholder="Detalhes..."/></div>
      <div style={{marginBottom:14}}><label style={S.lbl}>Duracao (minutos)</label><input disabled={lock} type="number" min={1} max={180} style={S.inp} value={f.duracaoMin||10} onChange={e=>setF(p=>({...p,duracaoMin:+e.target.value}))}/></div>

/* ══ LISTA — manual + Excel + visualizacao ══ */
function TabLista({lista}){
  const[modo,setModo]=useState("ver"); // ver | manual | excel
  const[form,setForm]=useState({unidade:"",nome:"",cpf:"",senha:"",inadimplente:false});
  const[editI,setEditI]=useState(null);const[formEdit,setFormEdit]=useState({});
  const[busca,setBusca]=useState("");
  const fRef=useRef();

  const adicionar=()=>{
    if(!form.unidade.trim()||!form.nome.trim()||!form.cpf.trim()||!form.senha.trim()){alert("Preencha todos os campos obrigatorios.");return;}
    const novo={...form,cpf:dig(form.cpf)};
    dbSet("lista/"+lista.length,novo);
    setForm({unidade:"",nome:"",cpf:"",senha:"",inadimplente:false});setModo("ver");
  };

  const imp=async e=>{
    const file=e.target.files[0];if(!file)return;
    if(!window.XLSX){alert("Aguarde...");return;}
    const buf=await file.arrayBuffer();const wb=window.XLSX.read(buf);
    const rows=window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
    const obj={};
    rows.forEach((r,i)=>{obj[i]={unidade:String(r.unidade||r.Unidade||""),nome:String(r.nome||r.Nome||""),cpf:dig(String(r.cpf||r.CPF||"")),senha:String(r.senha||r.Senha||"1234"),inadimplente:String(r.inadimplente||r.Inadimplente||"").toLowerCase()==="sim"};});
    dbSet("lista",obj);e.target.value="";alert("Lista importada: "+rows.length+" moradores.");setModo("ver");
  };

  const baixarModelo=()=>{
    if(!window.XLSX)return;
    const ws=window.XLSX.utils.aoa_to_sheet([["unidade","nome","cpf","senha","inadimplente"],["101","Carlos Silva","11111111111","1234","nao"],["102","Maria Souza","22222222222","1234","sim"]]);
    const wb=window.XLSX.utils.book_new();window.XLSX.utils.book_append_sheet(wb,ws,"Lista");
    window.XLSX.writeFile(wb,"modelo_lista_chamada.xlsx");
  };

  const toggleInad=(i)=>dbSet("lista/"+i,{...lista[i],inadimplente:!lista[i].inadimplente});
  const salvarEdit=()=>{dbSet("lista/"+editI,formEdit);setEditI(null);};
  const remover=(i)=>{if(confirm("Remover este morador?"))dbDel("lista/"+i);};

  const filtrada=lista.filter(m=>!busca||m.nome.toLowerCase().includes(busca.toLowerCase())||m.unidade.includes(busca)||fmtCPF(m.cpf).includes(busca));

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Barra de ações */}
      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
          <div><h3 style={{fontWeight:700,color:"#1e3a5f"}}>👥 Lista de Chamada</h3><p style={{fontSize:12,color:"#9ca3af",marginTop:2}}>{lista.length} moradores cadastrados</p></div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={()=>setModo(modo==="manual"?"ver":"manual")} style={{...S.btn(modo==="manual"?"#15803d":"#1d4ed8"),width:"auto",padding:"7px 12px",fontSize:12}}>➕ Adicionar manual</button>
            <button onClick={()=>fRef.current.click()} style={{...S.btn("#6366f1"),width:"auto",padding:"7px 12px",fontSize:12}}>📂 Importar Excel</button>
            <button onClick={baixarModelo} style={{...S.btn("#0891b2"),width:"auto",padding:"7px 12px",fontSize:12}}>📥 Baixar modelo</button>
            <input ref={fRef} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={imp}/>
          </div>
        </div>

        {/* Formulario adicionar manual */}
        {modo==="manual"&&(
          <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:14,marginBottom:14}}>
            <h4 style={{fontWeight:700,color:"#15803d",marginBottom:12}}>➕ Adicionar morador manualmente</h4>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div><label style={S.lbl}>Unidade *</label><input style={S.inp} placeholder="Ex: 101" value={form.unidade} onChange={e=>setForm(p=>({...p,unidade:e.target.value}))}/></div>
              <div><label style={S.lbl}>Senha *</label><input style={S.inp} placeholder="Senha para login" value={form.senha} onChange={e=>setForm(p=>({...p,senha:e.target.value}))}/></div>
            </div>
            <div style={{marginBottom:10}}><label style={S.lbl}>Nome completo *</label><input style={S.inp} placeholder="Nome do morador" value={form.nome} onChange={e=>setForm(p=>({...p,nome:e.target.value}))}/></div>
            <div style={{marginBottom:10}}><label style={S.lbl}>CPF *</label><input style={S.inp} placeholder="000.000.000-00" value={fmtCPF(form.cpf)} onChange={e=>setForm(p=>({...p,cpf:e.target.value}))}/></div>
            <label style={{display:"flex",alignItems:"center",gap:8,fontSize:14,marginBottom:12,cursor:"pointer"}}><input type="checkbox" checked={form.inadimplente} onChange={e=>setForm(p=>({...p,inadimplente:e.target.checked}))}/> Inadimplente (bloqueado de votar)</label>
            <div style={{display:"flex",gap:8}}>
              <button onClick={adicionar} style={{...S.btn("#15803d"),flex:1}}>✅ Salvar morador</button>
              <button onClick={()=>setModo("ver")} style={{...S.btnO,flex:1}}>Cancelar</button>
            </div>
          </div>
        )}

        {/* Busca */}
        <div style={{marginBottom:12}}><input style={S.inp} placeholder="🔍 Buscar por nome, unidade ou CPF..." value={busca} onChange={e=>setBusca(e.target.value)}/></div>

        {/* Tabela */}
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{background:"#f9fafb"}}>
              {["Unidade","Nome","CPF","Senha","Status",""].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:600,fontSize:12,color:"#6b7280",borderBottom:"1px solid #e5e7eb"}}>{h}</th>)}
            </tr></thead>
            <tbody>{filtrada.map((m,i)=>(
              <tr key={i} style={{borderBottom:"1px solid #f3f4f6"}}>
                <td style={{padding:"8px 10px",fontWeight:600}}>{m.unidade}</td>
                <td style={{padding:"8px 10px"}}>{m.nome}</td>
                <td style={{padding:"8px 10px",color:"#9ca3af",fontSize:12}}>{fmtCPF(m.cpf)}</td>
                <td style={{padding:"8px 10px",color:"#9ca3af",fontSize:12,fontFamily:"monospace"}}>{m.senha}</td>
                <td style={{padding:"8px 10px"}}><button onClick={()=>toggleInad(i)} style={{...S.badge(!m.inadimplente),cursor:"pointer",border:"none"}}>{m.inadimplente?"Inadimplente":"Regular"}</button></td>
                <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}>
                  <button onClick={()=>{setEditI(i);setFormEdit({...m});}} style={{background:"none",border:"none",color:"#1d4ed8",cursor:"pointer",fontSize:12,marginRight:6}}>Editar</button>
                  <button onClick={()=>remover(i)} style={{background:"none",border:"none",color:"#dc2626",cursor:"pointer",fontSize:12}}>Remover</button>
                </td>
              </tr>
            ))}</tbody>
          </table>
          {filtrada.length===0&&<p style={{textAlign:"center",color:"#9ca3af",padding:20}}>Nenhum morador encontrado.</p>}
        </div>
      </div>

      {/* Modal edicao */}
      {editI!==null&&(
        <div style={S.card}>
          <h4 style={{fontWeight:700,marginBottom:12,color:"#1e3a5f"}}>✏️ Editar morador</h4>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={S.lbl}>Unidade</label><input style={S.inp} value={formEdit.unidade||""} onChange={e=>setFormEdit(p=>({...p,unidade:e.target.value}))}/></div>
            <div><label style={S.lbl}>Senha</label><input style={S.inp} value={formEdit.senha||""} onChange={e=>setFormEdit(p=>({...p,senha:e.target.value}))}/></div>
          </div>
          <div style={{marginBottom:10}}><label style={S.lbl}>Nome</label><input style={S.inp} value={formEdit.nome||""} onChange={e=>setFormEdit(p=>({...p,nome:e.target.value}))}/></div>
          <div style={{marginBottom:10}}><label style={S.lbl}>CPF</label><input style={S.inp} value={fmtCPF(formEdit.cpf||"")} onChange={e=>setFormEdit(p=>({...p,cpf:dig(e.target.value)}))}/></div>
          <label style={{display:"flex",alignItems:"center",gap:8,fontSize:14,marginBottom:12,cursor:"pointer"}}><input type="checkbox" checked={formEdit.inadimplente||false} onChange={e=>setFormEdit(p=>({...p,inadimplente:e.target.checked}))}/> Inadimplente</label>
          <div style={{display:"flex",gap:8}}>
            <button onClick={salvarEdit} style={{...S.btn("#1d4ed8"),flex:1}}>Salvar</button>
            <button onClick={()=>setEditI(null)} style={{...S.btnO,flex:1}}>Cancelar</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══ RESULTADO ══ */
function Resultado({votos,enq,cond,lista,vot,onBack}){
  const ap=votos.filter(v=>v.voto==="Aprovado").length,rp=votos.filter(v=>v.voto==="Reprovado").length,ab=votos.filter(v=>v.voto==="Abstencao").length;
  const total=votos.length,aptos=lista.filter(m=>!m.inadimplente).length,votaram=new Set(votos.map(v=>v.unidade)).size;
  const ven=ap>rp?"APROVADO":rp>ap?"REPROVADO":"EMPATE";
  const vBg=ven==="APROVADO"?"#dcfce7":ven==="REPROVADO"?"#fee2e2":"#f3f4f6";
  const vTx=ven==="APROVADO"?"#166534":ven==="REPROVADO"?"#991b1b":"#374151";
  const dur=vot?.inicioTs&&vot?.fimTs?Math.round((vot.fimTs-vot.inicioTs)/1000):null;
  return(
    <div style={{background:"#f0f4f8",minHeight:"100vh",padding:16}}>
      <div style={{maxWidth:560,margin:"0 auto",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{...S.card,textAlign:"center"}}>
          <div style={{fontSize:34,marginBottom:4}}>📊</div>
          <h2 style={{fontWeight:700,fontSize:22,color:"#1e3a5f"}}>Resultado Final</h2>
          {cond&&<p style={{fontSize:14,color:"#6b7280",fontWeight:500}}>{cond.nome}</p>}
          <p style={{fontWeight:600,marginTop:4,color:"#1e3a5f"}}>{enq?.tema}</p>
          {dur&&<p style={{fontSize:12,color:"#9ca3af",marginTop:4}}>Duracao: {fmtT(dur)}</p>}
        </div>
        <div style={{background:vBg,border:"1px solid "+vTx,borderRadius:14,padding:"20px 16px",textAlign:"center"}}>
          <p style={{fontSize:12,fontWeight:700,color:vTx,textTransform:"uppercase",marginBottom:6}}>Resultado Final</p>
          <p style={{fontSize:38,fontWeight:700,color:vTx}}>{ven==="APROVADO"?"✅":ven==="REPROVADO"?"❌":"⚖️"} {ven}</p>
        </div>
        <div style={S.card}>
          <h3 style={{fontWeight:700,marginBottom:14,textAlign:"center",color:"#1e3a5f"}}>Apuracao</h3>
          {[["✅ Aprovado",ap,"#15803d"],["❌ Reprovado",rp,"#b91c1c"],["⚪ Abstencao",ab,"#4b5563"]].map(([l,v,bg])=>(
            <div key={l} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:14,fontWeight:600}}>{l}</span><span style={{fontSize:14,fontWeight:700,color:bg}}>{v} votos · {pct(v,total)}%</span></div>
              <div style={{background:"#e5e7eb",borderRadius:99,height:20,overflow:"hidden"}}>
                <div style={{width:pct(v,total)+"%",height:"100%",background:bg,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:v>0?8:0,transition:"width .7s"}}>
                  {Number(pct(v,total))>5&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>{pct(v,total)}%</span>}
                </div>
              </div>
            </div>
          ))}
        </div>
        <div style={S.card}>
          <h3 style={{fontWeight:700,marginBottom:14,textAlign:"center",color:"#1e3a5f"}}>Resumo</h3>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
            {[["Total votos",total],["Quorum",pct(votaram,aptos)+"%"],["Aptos",aptos],["Ausentes",aptos-votaram],["Aprovados",ap],["Reprovados",rp],["Abstencoes",ab],["Maioria",ap>rp?"Sim ✅":"Nao ❌"]].map(([l,v])=>(
              <div key={l} style={{background:"#f9fafb",borderRadius:8,padding:"12px 10px",textAlign:"center",border:"1px solid #e5e7eb"}}>
                <p style={{fontSize:20,fontWeight:700,color:"#1e3a5f",marginBottom:2}}>{v}</p><p style={{fontSize:11,color:"#6b7280"}}>{l}</p>
              </div>
            ))}
          </div>
        </div>
        {votos.length>0&&(
          <div style={S.card}>
            <h3 style={{fontWeight:700,marginBottom:12,color:"#1e3a5f"}}>Detalhamento</h3>
            {votos.map((v,i)=>(
              <div key={v._key||i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:i>0?"1px solid #f3f4f6":"none",gap:10}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  {v.foto?<img src={v.foto} alt="bio" style={{width:36,height:36,borderRadius:6,objectFit:"cover",border:"1px solid #e5e7eb"}}/>:<div style={{width:36,height:36,borderRadius:6,background:"#f3f4f6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>👤</div>}
                  <div><p style={{fontWeight:600,fontSize:14}}>Unid. {v.unidade} — {v.nome}</p>{v.procurador&&<p style={{fontSize:12,color:"#1d4ed8"}}>Procurador de {v.unidadeRep}</p>}<p style={{fontSize:11,color:"#9ca3af"}}>{v.ts}</p></div>
                </div>
                <span style={S.badge(v.voto==="Aprovado")}>{v.voto}</span>
              </div>
            ))}
          </div>
        )}
        <button onClick={onBack} style={S.btnO}>← Voltar</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
